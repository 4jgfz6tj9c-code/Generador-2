<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMindCo — Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0d0d0d;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 32px 20px;
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #4ade80;
  margin-bottom: 32px;
  text-align: center;
}

/* ── EDITOR PANEL ── */
.editor {
  max-width: 500px;
  margin: 0 auto 48px;
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  padding: 24px;
}

.editor h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #666;
  margin-bottom: 20px;
}

.field { margin-bottom: 16px; }
.field label { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#555; margin-bottom:6px; }
.field input, .field textarea, .field select {
  width: 100%;
  background: #0d0d0d;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 10px 14px;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus { border-color: #4ade80; }
.field textarea { resize: vertical; min-height: 80px; }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.btn-generate {
  width: 100%;
  background: #4ade80;
  color: #0d0d0d;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
}
.btn-generate:hover { background: #a3e635; transform: translateY(-1px); }

/* ── POSTS DISPLAY ── */
.posts-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 32px;
  max-width: 800px;
  margin: 0 auto;
}

/* ── SINGLE POST (1:1 square) ── */
.post {
  position: relative;
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  border-radius: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  cursor: pointer;
}

.post-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-color: #1a2a1a;
  transition: transform 6s ease;
}

.post:hover .post-bg { transform: scale(1.04); }

/* Dark overlay gradient */
.post-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.15) 0%,
    rgba(0,0,0,0.1) 30%,
    rgba(0,0,0,0.65) 60%,
    rgba(0,0,0,0.92) 100%
  );
}

/* Green accent bar top */
.post-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, #4ade80, #a3e635);
}

/* Breaking badge */
.post-badge {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #4ade80;
  color: #0d0d0d;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  padding: 4px 10px;
  text-transform: uppercase;
}

/* Language tag */
.post-lang {
  position: absolute;
  top: 20px;
  right: 20px;
  border: 1.5px solid rgba(255,255,255,0.5);
  color: rgba(255,255,255,0.9);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 10px;
  text-transform: uppercase;
}

/* Bottom content */
.post-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 24px 22px 20px;
}

.post-category {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #4ade80;
  margin-bottom: 8px;
  font-weight: 600;
}

.post-headline {
  font-size: clamp(22px, 5vw, 30px);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.5px;
  text-transform: uppercase;
  color: #ffffff;
  margin-bottom: 12px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.post-headline em {
  color: #4ade80;
  font-style: normal;
}

.post-meta {
  display: flex;
  align-items: center;
  gap: 12px;
}

.post-brand {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #4ade80;
  text-transform: uppercase;
}

.post-date {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1px;
}

.post-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}

/* Download hint */
.post-hint {
  text-align: center;
  font-size: 11px;
  color: #444;
  margin-top: 10px;
  letter-spacing: 1px;
}

/* Caption box */
.caption-box {
  max-width: 800px;
  margin: 32px auto 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 600px) {
  .caption-box { grid-template-columns: 1fr; }
  .posts-wrap { grid-template-columns: 1fr; }
}

.caption {
  background: #161616;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 20px;
}

.caption-lang {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #4ade80;
  margin-bottom: 12px;
  font-weight: 600;
}

.caption-text {
  font-size: 13px;
  color: #999;
  line-height: 1.7;
  white-space: pre-wrap;
  user-select: all;
}

.copy-btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 8px;
  color: #555;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s;
}
.copy-btn:hover { border-color: #4ade80; color: #4ade80; }
.copy-btn.copied { border-color: #4ade80; color: #4ade80; }
</style>
</head>
<body>

<h1>🌿 GreenMindCo — Post Generator</h1>

<!-- EDITOR -->
<div class="editor">
  <h2>✏️ Contenido del post</h2>

  <div class="field">
    <label>Categoría</label>
    <select id="category">
      <option>Legalización</option>
      <option>Ciencia</option>
      <option>Cultura</option>
      <option>Consejo</option>
      <option>Breaking News</option>
      <option>Estudio</option>
    </select>
  </div>

  <div class="field">
    <label>Titular en Español</label>
    <input type="text" id="headline-es" placeholder="Ej: Alemania legaliza el cannabis para uso personal" value="Alemania legaliza el cannabis para uso personal">
  </div>

  <div class="field">
    <label>Headline in English</label>
    <input type="text" id="headline-en" placeholder="Ej: Germany legalizes cannabis for personal use" value="Germany legalizes cannabis for personal use">
  </div>

  <div class="field">
    <label>Imagen de fondo</label>
    <input type="file" id="img-file" accept="image/*" onchange="previewImage(this)"
      style="background:#0d0d0d;border:1px dashed #4ade80;border-radius:8px;padding:12px 14px;color:#4ade80;cursor:pointer;font-size:13px;width:100%;">
    <div id="img-preview" style="margin-top:8px;display:none;">
      <img id="preview-img" style="width:100%;border-radius:8px;max-height:120px;object-fit:cover;" />
      <p style="font-size:11px;color:#555;margin-top:4px;letter-spacing:1px;">✓ IMAGEN CARGADA</p>
    </div>
  </div>

  <div class="field">
    <label>Caption en Español (descripción completa)</label>
    <textarea id="caption-es" placeholder="Escribe aquí la descripción completa para Instagram en español...">🌿 ALEMANIA DA EL PASO

El Bundestag aprobó la ley que permite a adultos poseer hasta 25 gramos de cannabis en espacios públicos y cultivar hasta 3 plantas en casa.

Es el cambio de política más importante en Europa en décadas. Un modelo que muchos países ya están mirando con atención.

¿Qué opinas? ¿Debería tu país seguir el mismo camino?

#cannabis #legalización #alemania #GreenMindCo #cannabiseducation</textarea>
  </div>

  <div class="field">
    <label>Caption in English (full description)</label>
    <textarea id="caption-en" placeholder="Write the full Instagram description in English...">🌿 GERMANY MAKES HISTORY

The Bundestag passed a law allowing adults to possess up to 25 grams of cannabis in public spaces and grow up to 3 plants at home.

This is the most significant drug policy shift in Europe in decades — and other countries are watching closely.

What do you think? Should your country follow the same path?

#cannabis #legalization #germany #GreenMindCo #cannabiseducation</textarea>
  </div>

  <button class="btn-generate" onclick="generate()">Generar Posts →</button>
</div>

<!-- POSTS -->
<div class="posts-wrap" id="posts-wrap">
  <!-- Generated here -->
</div>

<div class="caption-box" id="captions-wrap" style="display:none">
  <!-- Captions here -->
</div>

<script>
function previewImage(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById('preview-img').src = e.target.result;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('img-file')._dataUrl = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  }
}

function generate() {
  const cat     = document.getElementById('category').value;
  const headES  = document.getElementById('headline-es').value || 'Tu titular aquí';
  const headEN  = document.getElementById('headline-en').value || 'Your headline here';
  const imgUrl  = document.getElementById('img-file')._dataUrl || '';
  const capES   = document.getElementById('caption-es').value;
  const capEN   = document.getElementById('caption-en').value;

  const today = new Date().toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' }).toUpperCase();
  const todayEN = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }).toUpperCase();

  const bgStyle = imgUrl
    ? `background-image: url('${imgUrl}'); background-color: #1a2a1a;`
    : `background: linear-gradient(135deg, #0a1a0a 0%, #0f2a0f 40%, #0a1a0a 100%);`;

  function makePost(lang, headline, date) {
    return `
      <div>
        <div class="post">
          <div class="post-bg" style="${bgStyle}"></div>
          <div class="post-overlay"></div>
          <div class="post-bar"></div>
          <div class="post-badge">${cat}</div>
          <div class="post-lang">${lang}</div>
          <div class="post-content">
            <div class="post-category">GreenMindCo · ${cat}</div>
            <div class="post-headline">${headline}</div>
            <div class="post-meta">
              <span class="post-brand">@GreenMindCo</span>
              <span class="post-dot"></span>
              <span class="post-date">${date}</span>
            </div>
          </div>
        </div>
        <p class="post-hint">Captura de pantalla para guardar</p>
      </div>
    `;
  }

  document.getElementById('posts-wrap').innerHTML =
    makePost('ES', headES, today) +
    makePost('EN', headEN, todayEN);

  // Captions
  document.getElementById('captions-wrap').style.display = 'grid';
  document.getElementById('captions-wrap').innerHTML = `
    <div class="caption">
      <div class="caption-lang">📋 Caption — Español</div>
      <div class="caption-text" id="cap-es-text">${capES}</div>
      <button class="copy-btn" onclick="copyText('cap-es-text', this)">Copiar caption ES</button>
    </div>
    <div class="caption">
      <div class="caption-lang">📋 Caption — English</div>
      <div class="caption-text" id="cap-en-text">${capEN}</div>
      <button class="copy-btn" onclick="copyText('cap-en-text', this)">Copy caption EN</button>
    </div>
  `;

  // Scroll to posts
  document.getElementById('posts-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText(id, btn) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = btn.textContent.includes('EN') ? 'Copy caption EN' : 'Copiar caption ES';
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Generate on load with default values
window.onload = () => generate();
</script>
</body>
</html>
